<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Minesweeper</title>
		<meta charset="UTF-8" />
		<link rel="stylesheet" href="assets/css/style.css" />
	</head>

	<body>
		<div id="content">
			<div id="info" class="panel">
				placeholder placeholder
			</div>

			<div id="minefield-wrapper">
				<div id="info-bar">
					<div class="info-bar-text-wrapper">
						<div id="timer" class="info-bar-text">0</div>
					</div>
					
					<div id="face-wrapper">
						<div id="face"></div>
					</div>

					<div class="info-bar-text-wrapper">
						<div id="flag-counter" class="info-bar-text"></div>
						<div id="flag-icon"></div>
					</div>
				</div>
				<div id="minefield" draggable="false"></div>
			</div>

			<div id="menu" class="panel">
				<h3 id="menu-header">minesweeper</h3>

				<div id="menu-content">
					<div class="separator"></div>
					
					<div class="panel-section-header">
						<h4>new game</h4>
						<p id="main-menu-ctx"></p>
					</div>

					<div class="btn-row">
						<button id="new-game-beginner" class="main-menu-btn">beginner</button>
						<button id="new-game-intermediate" class="main-menu-btn">intermediate</button>
						<button id="new-game-expert" class="main-menu-btn">expert</button>
						<button id="new-game-custom" class="main-menu-btn btn-primary">custom</button>
					</div>

					<div class="separator"></div>

					<!--<p class="info-text">todo: remove dataset usage in favor of state map</p>
					<p class="info-text">todo: refactor chording code</p>-->
					<div class="btn-row">
						<button id="save" class="main-menu-btn btn-primary">save</button>
					</div>
				</div>
			</div>
		</div>
		<script src="src/app.js" type="module"></script>
	</body>
</html>
